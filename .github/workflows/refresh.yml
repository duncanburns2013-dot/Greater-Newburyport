name: Refresh market data

on:
  schedule:
    # 06:30 UTC every Sunday (offset 30 min from the housing-affordability
    # repo's refresh so they don't both hit MLSPIN at the same minute)
    - cron: '30 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh MLSPIN data
        env:
          BRIDGE_TOKEN: ${{ secrets.BRIDGE_TOKEN }}
        run: |
          if [ -z "$BRIDGE_TOKEN" ]; then
            echo "::warning::BRIDGE_TOKEN secret not set — skipping refresh."
            echo "Add it at Settings → Secrets and variables → Actions."
            exit 0
          fi
          printf 'BRIDGE_TOKEN=%s\nBRIDGE_DATASET=mlspin\n' "$BRIDGE_TOKEN" > .env
          node pipelines/fetch_data.js
          rm .env

      - name: Commit + push if data changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/processed/newburyport.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            STAMP=$(date -u +'%Y-%m-%d')
            git commit -m "chore(data): weekly refresh ${STAMP}"
            git push
          fi
